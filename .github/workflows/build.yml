name: Build and upload nightly

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Define Release Variables
        id: vars
        run: |
          NEW_VERSION="1.0.${{ github.run_number }}"
          TAG_NAME="nightly-${{ github.run_number }}"
          BUILD_DATE=$(date -u +%Y-%m-%d)
          DOWNLOAD_URL="https://github.com/MXFia19/TwitchUnblock/releases/download/$TAG_NAME/TwitchUnblock.ipa"
          
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "date=$BUILD_DATE" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

      # ✨ L'ÉTAPE MAGIQUE : Injecte les vraies infos DANS l'application avant la compilation
      - name: Inject Version, ID and App Icon
        run: |
          echo "--- Mise à jour de l'identifiant et de la version dans le code ---"
          # Remplace les identifiants par défaut s'ils existent encore
          find . -name "Info.plist" -exec plutil -replace CFBundleIdentifier -string "com.mxfia19.TwitchUnblock" {} \;
          find . -name "Info.plist" -exec plutil -replace CFBundleShortVersionString -string "${{ steps.vars.outputs.version }}" {} \;
          find . -name "Info.plist" -exec plutil -replace CFBundleVersion -string "${{ github.run_number }}" {} \;
          if [ -f "project.yml" ]; then sed -i '' 's/com.yourname/com.mxfia19/g' project.yml; fi
          
          echo "--- Création de l'icône iOS officielle ---"
          # Crée le dossier d'icônes natif d'Apple et télécharge ton image
          mkdir -p Sources/Assets.xcassets/AppIcon.appiconset
          curl -sL https://raw.githubusercontent.com/MXFia19/TwitchUnblock/master/assets/icon.png -o Sources/Assets.xcassets/AppIcon.appiconset/icon.png
          # Génère le fichier de configuration d'Apple pour l'icône
          cat <<EOF > Sources/Assets.xcassets/AppIcon.appiconset/Contents.json
          {
            "images" : [
              { "idiom" : "universal", "filename" : "icon.png", "scale" : "1x" }
            ],
            "info" : { "author" : "xcode", "version" : 1 }
          }
          EOF

      - name: Install XcodeGen & Generate Project
        run: |
          brew install xcodegen
          xcodegen generate --spec project.yml

      - name: Make build script executable
        run: chmod +x ./buildipa.sh

      - name: Build iOS IPA
        run: ./buildipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TwitchUnblock-Nightly-IPA
          path: build/TwitchUnblock.ipa

      - name: Create New Release & Upload IPA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.vars.outputs.tag }}" build/TwitchUnblock.ipa \
            --title "Nightly Build ${{ steps.vars.outputs.version }}" \
            --notes "Build automatique de la branche \`master\` le ${{ steps.vars.outputs.date }}."

      - name: Update apps.json (Feather source)
        run: |
          IPA_SIZE=$(stat -f%z build/TwitchUnblock.ipa || echo "1048576")
          
          jq --arg version "${{ steps.vars.outputs.version }}" \
             --arg build "${{ github.run_number }}" \
             --arg date "${{ steps.vars.outputs.date }}" \
             --arg url "${{ steps.vars.outputs.download_url }}" \
             --argjson size "$IPA_SIZE" \
            '.apps[0].versions[0].version = $version |
             .apps[0].versions[0].buildVersion = $build |
             .apps[0].versions[0].date = $date |
             .apps[0].versions[0].downloadURL = $url |
             .apps[0].versions[0].size = $size' apps.json > apps.json.tmp
             
          if [ -s apps.json.tmp ]; then
            mv apps.json.tmp apps.json
          else
            echo "Erreur critique : le fichier apps.json généré est corrompu ou vide."
            exit 1
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps.json
          git diff --cached --quiet || \
            (git commit -m "chore: bump version to ${{ steps.vars.outputs.version }} [skip ci]" && git push origin HEAD:master)
