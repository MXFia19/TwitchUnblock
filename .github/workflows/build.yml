# Inspired by https://github.com/cranci1/Luna/blob/main/.github/workflows/build.yml

name: Build and upload nightly

on:
  push:
    branches:
      - main
  workflow_dispatch:   # permet de déclencher manuellement depuis GitHub

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ─────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Make build script executable
        run: chmod +x ./buildipa.sh

      - name: Build iOS IPA
        run: ./buildipa.sh

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v7
        with:
          name: TwitchUnblock-Nightly-IPA
          path: build/TwitchUnblock.ipa

      - name: Upload IPA to beta release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create beta \
            --title "Nightly" \
            --notes "Dernier build automatique — branche \`main\`" \
            2>/dev/null || true
          gh release upload beta build/TwitchUnblock.ipa --clobber
